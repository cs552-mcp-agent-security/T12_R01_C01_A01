services:
  redis:
    image: redis:7-alpine
    container_name: ratelimit_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./.redisdata:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
