# Local development Redis configuration for ratelimit-redis.
# Not hardened for production.

bind 0.0.0.0
port 6379
protected-mode no

# Memory + eviction
maxmemory 64mb
maxmemory-policy allkeys-lru

# Persistence (rate limit state is regenerable, so we keep it simple)
appendonly no
save ""

# Logging
loglevel notice
